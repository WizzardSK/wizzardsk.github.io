name: Gamelists updater

on:
  schedule:
    # Every Sunday at 06:00 UTC, after the gameflix build (02:00) has produced gameflix.zip
    - cron: '0 6 * * 0'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run script
        run: bash update.sh
